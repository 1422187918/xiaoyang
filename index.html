<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>A股实时监测</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0e27;--card:#131836;--card-hover:#1a2040;--red:#ff4d4f;--green:#00c853;--text:#e0e0e0;--sub:#888;--gold:#ffd700;--border:#1e2a5e;--blue:#4488ff}
[data-theme="light"]{--bg:#f5f6fa;--card:#fff;--card-hover:#f0f1f5;--red:#e53935;--green:#43a047;--text:#333;--sub:#999;--gold:#b8860b;--border:#e0e3eb;--blue:#1976d2}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;font-size:14px;min-height:100vh;padding-bottom:calc(60px + env(safe-area-inset-bottom,0px));transition:background .3s,color .3s}
.container{max-width:1200px;margin:0 auto;padding:8px}

/* 顶部指数 */
.index-bar{display:flex;gap:6px;overflow-x:auto;padding:8px 0;scrollbar-width:none}
.index-bar::-webkit-scrollbar{display:none}
.index-card{flex:1;min-width:100px;background:var(--card);border-radius:10px;padding:10px 8px;text-align:center;border:1px solid var(--border)}
.index-card .name{font-size:11px;color:var(--sub);margin-bottom:4px}
.index-card .price{font-size:18px;font-weight:700}
.index-card .pct{font-size:12px;margin-top:2px}

/* 黄金实时价格区域 */
.gold-price-bar{display:flex;gap:6px;margin:6px 0}
.gold-price-card{flex:1;background:var(--card);border-radius:10px;padding:10px 8px;text-align:center;border:1px solid var(--border)}
.gold-price-card .g-name{font-size:11px;margin-bottom:4px;font-weight:600}
.gold-price-card .g-price{font-size:18px;font-weight:700}
.gold-price-card .g-change{font-size:12px;margin-top:2px}
.gold-price-card .g-pct{font-size:12px;margin-top:1px}
.gold-intl{border-color:rgba(255,215,0,.4);background:linear-gradient(135deg,#1a1a3e,#2a2a1e)}
.gold-intl .g-name{color:var(--gold)}
.gold-domestic{border-color:rgba(255,77,79,.4);background:linear-gradient(135deg,#1a2e1e,#2e1e1e)}
.gold-domestic .g-name{color:var(--red)}

/* 汇总栏 */
.summary-bar{display:flex;gap:6px;margin:8px 0;flex-wrap:wrap}
.summary-item{flex:1;min-width:70px;background:var(--card);border-radius:8px;padding:8px;text-align:center;border:1px solid var(--border)}
.summary-item .sl-name{font-size:10px;color:var(--sub)}
.summary-item .sl-val{font-size:16px;font-weight:700;margin-top:2px}

/* 情绪条 */
.sentiment-bar-wrap{margin:8px 0;background:var(--card);border-radius:8px;padding:10px;border:1px solid var(--border)}
.sentiment-bar-wrap .sb-label{font-size:11px;color:var(--sub);margin-bottom:6px;display:flex;justify-content:space-between}
.sentiment-bar{height:24px;border-radius:12px;overflow:hidden;display:flex;position:relative}
.sentiment-bar .sb-up{background:linear-gradient(90deg,#ff4d4f,#ff7a45);transition:width .5s}
.sentiment-bar .sb-down{background:linear-gradient(90deg,#00c853,#00b860);transition:width .5s}
.sentiment-bar .sb-text{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;text-shadow:0 0 4px rgba(0,0,0,.8)}

/* 板块网格 */
.section-title{font-size:15px;font-weight:700;margin:14px 0 8px;padding-left:4px;border-left:3px solid var(--blue);line-height:1.4}
.sector-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
@media(min-width:600px){.sector-grid{grid-template-columns:repeat(3,1fr);gap:8px}}
@media(min-width:900px){.sector-grid{grid-template-columns:repeat(4,1fr)}}
.sector-card{background:var(--card);border-radius:10px;padding:10px 8px;cursor:pointer;transition:all .2s;border:1px solid var(--border);position:relative;overflow:hidden}
.sector-card:active{transform:scale(.97)}
.sector-card .s-name{font-size:13px;font-weight:600;margin-bottom:4px}
.sector-card .s-pct{font-size:20px;font-weight:700;line-height:1.2}
.sector-card .s-flow{font-size:10px;color:var(--sub);margin-top:3px}
.sector-card .s-bar{height:3px;border-radius:2px;margin-top:6px}

/* 成分股展开 */
.stock-list{display:none;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.sector-card.expanded{border:1px solid rgba(68,136,255,.5);box-shadow:0 0 12px rgba(68,136,255,.15)}
.sector-card .s-name{display:flex;align-items:center;justify-content:space-between}
.stock-list.show{display:block}
.stock-item{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.stock-item .si-name{flex:1;color:var(--text)}
.stock-item .si-price{margin:0 8px;font-weight:600}
.stock-item .si-pct{min-width:50px;text-align:right;font-weight:600}

/* 涨跌排行 */
.rank-section{display:flex;gap:8px;margin:8px 0}
.rank-col{flex:1;background:var(--card);border-radius:10px;padding:8px;border:1px solid var(--border)}
.rank-col h4{font-size:12px;color:var(--sub);margin-bottom:6px;text-align:center}
.rank-item{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:12px;border-bottom:1px solid rgba(255,255,255,.03)}
.rank-item:last-child{border-bottom:none}
.rank-item .ri-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.rank-item .ri-pct{margin-left:8px;font-weight:600}

/* 板块排行表 */
.sector-rank-table{width:100%;border-collapse:collapse;margin:8px 0;font-size:12px}
.sector-rank-table th{color:var(--sub);font-weight:400;padding:6px 4px;text-align:left;border-bottom:1px solid var(--border);font-size:11px}
.sector-rank-table td{padding:6px 4px;border-bottom:1px solid rgba(255,255,255,.03)}
.sector-rank-table tr:active{background:var(--card-hover)}
.flow-bar{display:inline-block;height:8px;border-radius:4px;vertical-align:middle;margin-right:4px}

/* 资金流向排行 */
.flow-rank-list{margin:8px 0}
.flow-rank-item{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.flow-rank-item:last-child{border-bottom:none}
.flow-rank-item .fr-name{width:80px;font-size:12px;font-weight:600}
.flow-rank-item .fr-bar{flex:1;height:16px;border-radius:8px;overflow:hidden;background:rgba(255,255,255,.05);position:relative}
.flow-rank-item .fr-bar-fill{height:100%;border-radius:8px;transition:width .5s}
.flow-rank-item .fr-val{width:70px;text-align:right;font-size:12px;font-weight:600}

/* 情绪仪表盘 */
.sentiment-gauge-wrap{margin:8px 0;background:var(--card);border-radius:10px;padding:12px;border:1px solid var(--border);text-align:center}
.sentiment-gauge{position:relative;max-width:240px;margin:0 auto}
.gauge-value{font-size:28px;font-weight:700;margin-top:-30px;position:relative;z-index:1}
.gauge-label{font-size:12px;color:var(--sub);margin-top:4px}
.gauge-scale{display:flex;justify-content:space-between;font-size:10px;color:var(--sub);margin-top:4px;padding:0 10px}

/* 复盘播报 */
.review-card{margin:8px 0;background:var(--card);border-radius:10px;padding:14px;border:1px solid var(--border)}
.review-card .rv-title{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.review-card .rv-content{font-size:13px;line-height:1.8;color:var(--text)}

/* 主题切换按钮 */
.theme-toggle{position:fixed;top:8px;right:8px;z-index:200;background:var(--card);border:1px solid var(--border);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .3s}
.theme-toggle:active{transform:scale(.9)}

/* 非交易时间提示 */
.market-status-bar{margin:6px 0;padding:8px 12px;border-radius:8px;font-size:12px;text-align:center;display:none}
.market-status-bar.show{display:block}
.market-status-bar.closed{background:rgba(255,193,7,.15);color:#ffc107;border:1px solid rgba(255,193,7,.3)}
.market-status-bar.open{background:rgba(0,200,83,.1);color:var(--green);border:1px solid rgba(0,200,83,.2)}

/* 导出按钮 */
.export-btn{background:var(--blue);color:#fff;border:none;border-radius:6px;padding:4px 12px;font-size:12px;cursor:pointer;transition:all .2s}
.export-btn:active{transform:scale(.95)}
.export-btn:hover{opacity:.85}
.review-card .rv-content .rv-row{display:flex;justify-content:space-between;padding:2px 0}
.review-card .rv-content .rv-row .rv-val{font-weight:600}
.rv-section{margin-top:12px;padding-top:10px;border-top:1px solid var(--border)}
.rv-section-title{font-size:13px;font-weight:700;color:var(--blue);margin-bottom:6px}
.rv-summary{text-align:left;font-size:13px;line-height:2;color:var(--text);background:rgba(68,136,255,.06);border-radius:8px;padding:10px;margin-top:8px}
.rv-summary .highlight{font-weight:700}
.rv-sector-table{width:100%;border-collapse:collapse;margin-top:6px;font-size:12px}
.rv-sector-table th{color:var(--sub);font-weight:400;padding:5px 4px;text-align:left;border-bottom:1px solid var(--border);font-size:11px}
.rv-sector-table td{padding:5px 4px;border-bottom:1px solid rgba(255,255,255,.03)}
.rv-stock-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.rv-stock-tag{display:inline-flex;align-items:center;gap:3px;background:rgba(255,255,255,.05);border-radius:6px;padding:3px 8px;font-size:11px}
.rv-stock-tag .tag-name{font-weight:600}
.rv-stock-tag .tag-pct{font-weight:700}
.rv-flow-row{display:flex;align-items:center;gap:6px;padding:3px 0;font-size:12px}
.rv-flow-row .rf-name{width:70px;font-weight:600}
.rv-flow-row .rf-bar{flex:1;height:10px;border-radius:5px;background:rgba(255,255,255,.05);overflow:hidden}
.rv-flow-row .rf-fill{height:100%;border-radius:5px}
.rv-flow-row .rf-val{width:65px;text-align:right;font-weight:600}

/* 底部 */
.footer{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:1px solid var(--border);padding:6px 8px;display:flex;justify-content:space-between;align-items:center;font-size:11px;color:var(--sub);z-index:100}
.footer .refresh-info{display:flex;align-items:center;gap:4px}
.refresh-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.red{color:var(--red)}
.green{color:var(--green)}
.loading{text-align:center;color:var(--sub);padding:20px;font-size:13px}
</style>
</head>
<body>
<!-- 主题切换按钮 -->
<div class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</div>

<div class="container">
  <!-- 非交易时间提示 -->
  <div class="market-status-bar" id="marketStatusBar"></div>

  <!-- 1. 大盘指数 -->
  <div class="index-bar" id="indexBar">
    <div class="loading">加载中...</div>
  </div>

  <!-- 2. 黄金实时价格 -->
  <div class="gold-price-bar" id="goldPriceBar">
    <div class="gold-price-card gold-intl">
      <div class="g-name">国际金价（COMEX黄金）</div>
      <div class="g-price" id="intlGoldPrice">--</div>
      <div class="g-change" id="intlGoldChange">--</div>
      <div class="g-pct" id="intlGoldPct">--</div>
    </div>
    <div class="gold-price-card gold-domestic">
      <div class="g-name">国内金价（上海黄金9999）</div>
      <div class="g-price" id="domGoldPrice">--</div>
      <div class="g-change" id="domGoldChange">--</div>
      <div class="g-pct" id="domGoldPct">--</div>
    </div>
  </div>

  <!-- 3. 汇总栏 - 样本股涨跌统计 -->
  <div class="summary-bar" id="summaryBar"></div>
  <div class="sentiment-bar-wrap" id="sentimentBarWrap" style="display:none">
    <div class="sb-label"><span>样本股多空力量对比（共67只）</span><span id="sbRatio">--</span></div>
    <div class="sentiment-bar">
      <div class="sb-up" style="width:50%"></div>
      <div class="sb-down" style="width:50%"></div>
      <div class="sb-text" id="sbText">上涨 0 | 下跌 0</div>
    </div>
  </div>

  <!-- 4. 市场情绪指标 -->
  <div class="section-title">市场情绪指标 <span style="font-size:11px;color:var(--sub);font-weight:400">（基于67只样本股）</span></div>
  <div class="sentiment-gauge-wrap">
    <div class="sentiment-gauge" id="sentimentGauge">
      <svg viewBox="0 0 200 110">
        <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#1e2a5e" stroke-width="14" stroke-linecap="round"/>
        <path id="gaugeArc" d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#4488ff" stroke-width="14" stroke-linecap="round" stroke-dasharray="251.3" stroke-dashoffset="125.6"/>
        <circle id="gaugeDot" cx="100" cy="20" r="4" fill="#fff"/>
      </svg>
      <div class="gauge-value">
        <span id="gaugeNum">50</span>
      </div>
      <div class="gauge-label" id="gaugeLabel">中性</div>
      <div class="gauge-scale">
        <span>极度恐慌</span>
        <span>恐慌</span>
        <span>中性</span>
        <span>贪婪</span>
        <span>极度贪婪</span>
      </div>
    </div>
  </div>

  <!-- 5. 板块热力图 -->
  <div class="section-title">板块热力图</div>
  <div class="sector-grid" id="sectorGrid"></div>

  <!-- 6. 板块涨跌排行 -->
  <div class="section-title">板块涨跌排行</div>
  <div class="rank-section">
    <div class="rank-col">
      <h4 style="color:var(--red)">涨幅 TOP5</h4>
      <div id="rankUp"></div>
    </div>
    <div class="rank-col">
      <h4 style="color:var(--green)">跌幅 TOP5</h4>
      <div id="rankDown"></div>
    </div>
  </div>

  <!-- 7. 板块资金流向 -->
  <div class="section-title">板块资金流向</div>
  <div class="flow-rank-list" id="flowRank"></div>

  <!-- 8. 个股涨跌排行 -->
  <div class="section-title">个股涨跌排行 TOP5</div>
  <div class="rank-section">
    <div class="rank-col">
      <h4 style="color:var(--red)">涨幅 TOP5</h4>
      <div id="stockRankUp"></div>
    </div>
    <div class="rank-col">
      <h4 style="color:var(--green)">跌幅 TOP5</h4>
      <div id="stockRankDown"></div>
    </div>
  </div>

  <!-- 9. 晚间复盘播报 -->
  <div class="section-title">今日复盘播报 <button class="export-btn" id="exportBtn" onclick="exportReview()" style="display:none;margin-left:8px">📋 导出复盘</button></div>
  <div class="review-card" id="reviewCard">
    <div class="rv-title">📊 等待收盘后生成复盘...</div>
  </div>
</div>

<!-- 底部状态栏 -->
<div class="footer">
  <div class="refresh-info">
    <div class="refresh-dot"></div>
    <span id="refreshInfo">刷新中...</span>
  </div>
  <div>A股实时监测 · 5秒自动刷新</div>
</div>

<!-- 导出用隐藏canvas -->
<canvas id="exportCanvas" style="display:none"></canvas>

<script>
// ====== 配置 ======

// ====== 全局状态 ======
let allStockData = {};
let sectorData = [];
let expandedSectors = new Set(); // 记住展开的板块
let currentTheme = 'dark';

// ====== 主题切换 ======
function toggleTheme(){
  currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', currentTheme === 'light' ? 'light' : '');
  document.getElementById('themeToggle').textContent = currentTheme === 'dark' ? '🌙' : '☀️';
  try{ localStorage.setItem('stock-theme', currentTheme); }catch(e){}
}
// 恢复主题
try{
  const saved = localStorage.getItem('stock-theme');
  if(saved === 'light'){ currentTheme = 'light'; document.documentElement.setAttribute('data-theme','light'); document.getElementById('themeToggle').textContent = '☀️'; }
}catch(e){}

// ====== 非交易时间检测 ======

  const now = new Date();
  const day = now.getDay();
  const hour = now.getHours();
  const min = now.getMinutes();
  const timeStr = hour * 60 + min;
  const bar = document.getElementById('marketStatusBar');
  // 周末
  if(day === 0 || day === 6){
    bar.className = 'market-status-bar show closed';
    bar.textContent = '⏰ 当前为周末非交易时间，显示最近收盘数据';
    return false;
  }
  // 交易时间 9:15-15:05
  if(timeStr >= 555 && timeStr <= 905){
    bar.className = 'market-status-bar show open';
    bar.textContent = '🟢 交易时间内，数据实时更新';
    return true;
  }
  // 盘前盘后
  bar.className = 'market-status-bar show closed';
  if(timeStr < 555) bar.textContent = '⏰ 盘前等待开盘（9:30），当前显示昨日收盘数据';
  else bar.textContent = '⏰ 已收盘，显示今日收盘数据';
  return false;
}

// ====== 工具函数 ======
function fmtPrice(p){return p!=null && !isNaN(p) ? p.toFixed(2) : '--'}
function fmtPct(p){return p!=null && !isNaN(p) ? (p>=0?'+':'') + p.toFixed(2) + '%' : '--'}
function fmtFlow(f){
  if(f==null || isNaN(f)) return '--';
  const abs = Math.abs(f);
  if(abs >= 1e8) return (f/1e8).toFixed(2) + '亿';
  if(abs >= 1e4) return (f/1e4).toFixed(2) + '万';
  return f.toFixed(0);
}
function colorClass(p){
  if(p==null || isNaN(p)) return '';
  return p >= 0 ? 'red' : 'green';
}
function isLimitUp(code, pct){
  if(code.startsWith('sz300') || code.startsWith('sh688')) return pct >= 19.9;
  return pct >= 9.9;
}
function isLimitDown(code, pct){
  if(code.startsWith('sz300') || code.startsWith('sh688')) return pct <= -19.9;
  return pct <= -9.9;
}

function parseData(text){
  const lines = text.split(';').filter(l=>l.trim());
  lines.forEach(line=>{
    const match = line.match(/v_(\w+)="(.*)"/);
    if(!match) return;
    const code = match[1];
    const dataStr = match[2];
    const fields = dataStr.split('~');
    if(fields.length < 45) return;

    const name = fields[1] || code;
    const price = parseFloat(fields[3]) || 0;
    const prevClose = parseFloat(fields[4]) || 0;
    const pct = parseFloat(fields[32]) || 0;
    const change = price - prevClose;
    const high = parseFloat(fields[33]) || 0;
    const low = parseFloat(fields[34]) || 0;
    const volume = parseFloat(fields[36]) || 0;
    const turnover = parseFloat(fields[37]) || 0;
    const turnoverRate = parseFloat(fields[38]) || 0;
    let mainFlow = 0;
    if(fields.length > 184){
      mainFlow = parseFloat(fields[184]) || 0;
    }
    if(!mainFlow && fields.length > 62){
      mainFlow = parseFloat(fields[62]) || 0;
    }
    if(!mainFlow){
      mainFlow = change * volume * 100 * 0.3;
    }
    allStockData[code] = {
      name, price, prevClose, change, pct, high, low,
      volume, turnover, turnoverRate, mainFlow
    };
  });
}

// ====== 渲染：市场情绪仪表盘 ======
function renderSentimentGauge(){
  let upCount=0, downCount=0, limitUp=0, limitDown=0;
  SECTORS.forEach(s=>{
    s.stocks.forEach(st=>{
      const d = allStockData[st.c];
      if(!d) return;
      if(d.pct > 0) upCount++;
      else if(d.pct < 0) downCount++;
      if(isLimitUp(st.c, d.pct)) limitUp++;
      if(isLimitDown(st.c, d.pct)) limitDown++;
    });
  });
  const total = upCount + downCount;
  if(total === 0) return;

  // 情绪分数: 0-100
  const upRatio = upCount / total;
  const limitBonus = (limitUp - limitDown) / total * 20;
  let score = Math.round(upRatio * 100 + limitBonus);
  score = Math.max(0, Math.min(100, score));

  // 仪表盘弧线
  const arcLength = 251.3;
  const offset = arcLength * (1 - score / 100);
  document.getElementById('gaugeArc').setAttribute('stroke-dashoffset', offset);

  // 指针位置
  const angle = 180 - (score / 100) * 180;
  const rad = angle * Math.PI / 180;
  const cx = 100 + 80 * Math.cos(rad);
  const cy = 100 - 80 * Math.sin(rad);
  document.getElementById('gaugeDot').setAttribute('cx', cx);
  document.getElementById('gaugeDot').setAttribute('cy', cy);

  // 数值和标签
  document.getElementById('gaugeNum').textContent = score;
  let label, color;
  if(score < 20){label='极度恐慌'; color='#00c853'}
  else if(score < 40){label='恐慌'; color='#4488ff'}
  else if(score < 60){label='中性'; color='#888'}
  else if(score < 80){label='贪婪'; color='#ff7a45'}
  else{label='极度贪婪'; color='#ff4d4f'}
  const gaugeLabel = document.getElementById('gaugeLabel');
  gaugeLabel.textContent = label;
  gaugeLabel.style.color = color;
  document.getElementById('gaugeNum').style.color = color;
}

function toggleStocks(el, name){
  const list = el.querySelector('.stock-list');
  if(!list) return;
  const arrow = el.querySelector('.sn-arrow');
  if(expandedSectors.has(name)){
    expandedSectors.delete(name);
    list.classList.remove('show');
    el.classList.remove('expanded');
    if(arrow) arrow.textContent = '▸';
  } else {
    expandedSectors.add(name);
    list.classList.add('show');
    el.classList.add('expanded');
    if(arrow) arrow.textContent = '▾';
  }
}

  else{mood='弱势调整';moodColor='green';moodText='市场情绪低迷，空头占据主导，亏钱效应明显，建议规避风险。'}

  const dateStr = now.toLocaleDateString('zh-CN',{year:'numeric',month:'long',day:'numeric'});
  let summaryText = `今日（${dateStr}）A股收盘，`;
  if(sh){summaryText += `上证指数报${fmtPrice(sh.price)}点，${sh.pct>=0?'涨':'跌'}${fmtPct(sh.pct)}；`;}
  if(sz){summaryText += `深证成指报${fmtPrice(sz.price)}点，${sz.pct>=0?'涨':'跌'}${fmtPct(sz.pct)}；`;}
  if(cy){summaryText += `创业板指报${fmtPrice(cy.price)}点，${cy.pct>=0?'涨':'跌'}${fmtPct(cy.pct)}。`;}
  summaryText += `67只样本股中，${upCount}只上涨、${downCount}只下跌、${flatCount}只平盘，涨停${limitUp}只、跌停${limitDown}只。`;
  summaryText += `主力资金${totalFlow>=0?'净流入':'净流出'}${fmtFlow(totalFlow)}。`;
  summaryText += `${bestSector.name}领涨（${fmtPct(bestSector.pct)}），${worstSector.name}领跌（${fmtPct(worstSector.pct)}）。`;
  summaryText += `个股方面，${bestStock.name}涨幅居首（${fmtPct(bestStock.pct)}），${worstStock.name}跌幅最大（${fmtPct(worstStock.pct)}）。`;
  summaryText += moodText;

  // 板块涨跌表格
  const sectorTableHtml = sortedSectors.map((s,i)=>{
    const cls = s.pct >= 0 ? 'red' : 'green';
    const flowCls = s.flow >= 0 ? 'red' : 'green';
    return `<tr>
      <td>${i+1}</td>
      <td style="font-weight:600">${s.name}</td>
      <td class="${cls}" style="font-weight:600">${fmtPct(s.pct)}</td>
      <td class="${flowCls}">${s.flow>=0?'+':''}${fmtFlow(s.flow)}</td>
      <td style="color:var(--sub)">${s.count}只</td>
    </tr>`;
  }).join('');

  // 涨幅TOP5标签
  const top5Html = top5Stocks.map(s=>{
    const cls = colorClass(s.pct);
    return `<div class="rv-stock-tag"><span class="tag-name">${s.name}</span><span class="tag-pct ${cls}">${fmtPct(s.pct)}</span></div>`;
  }).join('');

  // 跌幅TOP5标签
  const bottom5Html = bottom5Stocks.map(s=>{
    const cls = colorClass(s.pct);
    return `<div class="rv-stock-tag"><span class="tag-name">${s.name}</span><span class="tag-pct ${cls}">${fmtPct(s.pct)}</span></div>`;
  }).join('');

  // 资金流入TOP3
  const flowInHtml = flowInTop3.map(s=>{
    const w = (Math.abs(s.flow)/flowInMax*100).toFixed(1);
    return `<div class="rv-flow-row"><span class="rf-name">${s.name}</span><div class="rf-bar"><div class="rf-fill" style="width:${w}%;background:var(--red)"></div></div><span class="rf-val red">+${fmtFlow(s.flow)}</span></div>`;
  }).join('');

  // 资金流出TOP3
  const flowOutHtml = flowOutTop3.map(s=>{
    const w = (Math.abs(s.flow)/flowOutMax*100).toFixed(1);
    return `<div class="rv-flow-row"><span class="rf-name">${s.name}</span><div class="rf-bar"><div class="rf-fill" style="width:${w}%;background:var(--green)"></div></div><span class="rf-val green">${fmtFlow(s.flow)}</span></div>`;
  }).join('');

  el.innerHTML = `<div class="rv-title">📊 今日复盘播报 · ${dateStr}</div>
    <div class="rv-content">
      <!-- 一、大盘概况 -->
      <div class="rv-row"><span>上证指数</span><span class="rv-val ${sh?.pct>=0?'red':'green'}">${fmtPrice(sh?.price)} (${fmtPct(sh?.pct)})</span></div>
      <div class="rv-row"><span>深证成指</span><span class="rv-val ${sz?.pct>=0?'red':'green'}">${fmtPrice(sz?.price)} (${fmtPct(sz?.pct)})</span></div>
      <div class="rv-row"><span>创业板指</span><span class="rv-val ${cy?.pct>=0?'red':'green'}">${fmtPrice(cy?.price)} (${fmtPct(cy?.pct)})</span></div>

      <!-- 二、涨跌统计 -->
      <div class="rv-section">
        <div class="rv-section-title">📈 涨跌统计</div>
        <div class="rv-row"><span>上涨 / 下跌 / 平盘</span><span><span class="rv-val red">${upCount}</span> / <span class="rv-val green">${downCount}</span> / <span class="rv-val">${flatCount}</span></span></div>
        <div class="rv-row"><span>涨跌比</span><span class="rv-val">${upRatio}% : ${downRatio}%</span></div>
        <div class="rv-row"><span>涨停 / 跌停</span><span><span class="rv-val red">${limitUp}</span> / <span class="rv-val green">${limitDown}</span></span></div>
        <div class="rv-row"><span>主力资金</span><span class="rv-val ${totalFlow>=0?'red':'green'}">${totalFlow>=0?'净流入':'净流出'} ${fmtFlow(totalFlow)}</span></div>
        <div class="rv-row"><span>市场情绪</span><span class="rv-val" style="color:${moodColor}">${mood}</span></div>
      </div>

      <!-- 三、板块涨跌排行 -->
      <div class="rv-section">
        <div class="rv-section-title">🏦 板块涨跌排行</div>
        <table class="rv-sector-table">
          <thead><tr><th>#</th><th>板块</th><th>涨跌幅</th><th>主力资金</th><th>成分股</th></tr></thead>
          <tbody>${sectorTableHtml}</tbody>
        </table>
      </div>

      <!-- 四、个股涨跌TOP5 -->
      <div class="rv-section">
        <div class="rv-section-title">🏆 涨幅 TOP5</div>
        <div class="rv-stock-list">${top5Html}</div>
      </div>
      <div class="rv-section">
        <div class="rv-section-title" style="color:var(--green)">📉 跌幅 TOP5</div>
        <div class="rv-stock-list">${bottom5Html}</div>
      </div>

      <!-- 五、资金流向 -->
      <div class="rv-section">
        <div class="rv-section-title" style="color:var(--red)">💰 资金流入 TOP3</div>
        ${flowInHtml}
      </div>
      <div class="rv-section">
        <div class="rv-section-title" style="color:var(--green)">💸 资金流出 TOP3</div>
        ${flowOutHtml}
      </div>

      <!-- 六、今日总结 -->
      <div class="rv-section">
        <div class="rv-section-title">📝 今日总结</div>
        <div class="rv-summary">${summaryText}</div>
      </div>`;
}

// ====== 导出复盘 ======
function exportReview(){
  const el = document.getElementById('reviewCard');
  if(!el || el.querySelector('.rv-title')?.textContent?.includes('等待')){
    alert('复盘数据尚未生成（收盘后自动生成）');
    return;
  }
  // 提取纯文本
  const lines = [];
  const title = el.querySelector('.rv-title');
  if(title) lines.push(title.textContent.trim());
  lines.push('================================');
  // 遍历所有行
  el.querySelectorAll('.rv-row').forEach(row=>{
    const spans = row.querySelectorAll('span');
    if(spans.length >= 2){
      lines.push(spans[0].textContent.trim() + '：' + spans[spans.length-1].textContent.trim());
    }
  });
  el.querySelectorAll('.rv-section-title').forEach(t=>{
    lines.push('\n' + t.textContent.trim());
  });
  el.querySelectorAll('.rv-sector-table tr').forEach(tr=>{
    const tds = tr.querySelectorAll('td,th');
    if(tds.length > 0){
      lines.push(Array.from(tds).map(td=>td.textContent.trim()).join(' | '));
    }
  });
  el.querySelectorAll('.rv-stock-tag').forEach(tag=>{
    lines.push(tag.textContent.trim());
  });
  el.querySelectorAll('.rv-flow-row').forEach(row=>{
    const name = row.querySelector('.rf-name')?.textContent?.trim() || '';
    const val = row.querySelector('.rf-val')?.textContent?.trim() || '';
    if(name) lines.push(name + '：' + val);
  });
  const summary = el.querySelector('.rv-summary');
  if(summary){ lines.push('\n📝 今日总结'); lines.push(summary.textContent.trim()); }
  lines.push('\n—— 由A股实时监测系统生成');

  // 下载为txt文件
  const text = lines.join('\n');
  const blob = new Blob([text], {type:'text/plain;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  const dateStr = now.getFullYear() + '-' + String(now.getMonth()+1).padStart(2,'0') + '-' + String(now.getDate()).padStart(2,'0');
  a.download = 'A股复盘_' + dateStr + '.txt';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}
// ====== 渲染：全部 ======
function renderAll(){
  checkMarketTime();
  renderIndexBar();
  renderGoldPrice();
  renderSummary();
  renderSentimentGauge();
  renderSectorGrid();
  renderSectorRanking();
  renderFlowRanking();
  renderStockRanking();
  renderReview();
  // 导出按钮显隐
  const now = new Date();
  const exportBtn = document.getElementById('exportBtn');
  if(exportBtn){
    exportBtn.style.display = (now.getHours() >= 15) ? 'inline-block' : 'none';
  }
}

// ====== 启动 ======
async function init(){
  await fetchAllData();
  renderAll();
  document.getElementById('refreshInfo').textContent = '已刷新 ' + new Date().toLocaleTimeString('zh-CN');

  setInterval(async()=>{
    await fetchAllData();
    renderAll();
    document.getElementById('refreshInfo').textContent = '已刷新 ' + new Date().toLocaleTimeString('zh-CN');
  }, REFRESH_MS);
}

init();
</script>
